{% load static %}
<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI 매칭 서비스 - DEPT</title>
  <meta name="description" content="AI가 추천하는 최고의 팀원 및 소모임 매칭 시스템">
  
  <!-- RemixIcon -->
  <link href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css" rel="stylesheet" />
  
  <!-- Outfit & Inter Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Inter:wght@300;400;500;700&display=swap" rel="stylesheet">
  
  <!-- Custom CSS style same as dashboard base -->
  <link rel="stylesheet" href="{% static 'main/css/style.css' %}?v=1.0.5">
  
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      corePlugins: {
        preflight: false,
      },
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
            outfit: ['Outfit', 'sans-serif'],
          }
        }
      }
    }
  </script>

  <style>
    body {
      background-color: var(--bg-dark);
      color: var(--text-primary);
      font-family: var(--font-sans);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    
    /* Glowing background blobs */
    .glow-bg {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: -1;
      overflow: hidden;
      pointer-events: none;
    }
    .blob {
      position: absolute;
      width: 500px;
      height: 500px;
      border-radius: 50%;
      filter: blur(120px);
      opacity: 0.06;
      animation: float 20s infinite alternate;
    }
    .blob-purple {
      background: #7c3aed;
      top: -10%;
      left: -10%;
    }
    .blob-blue {
      background: #2563eb;
      bottom: -10%;
      right: -10%;
      animation-delay: -5s;
    }
    .blob-pink {
      background: #ec4899;
      top: 40%;
      left: 60%;
      animation-delay: -10s;
    }
    @keyframes float {
      0% { transform: translate(0, 0) scale(1); }
      100% { transform: translate(50px, 50px) scale(1.1); }
    }

    /* Glassmorphism panel */
    .glass-panel {
      background: #ffffff;
      border: 1px solid rgba(15, 23, 42, 0.08);
      border-radius: 24px;
      box-shadow: var(--shadow-md);
    }
    
    /* Tabs styling */
    .tab-btn {
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .tab-btn.active {
      background: linear-gradient(135deg, #7c3aed 0%, #2563eb 100%) !important;
      box-shadow: 0 4px 15px rgba(124, 58, 237, 0.25) !important;
      border-color: transparent !important;
      color: #ffffff !important;
    }

    /* Input focus styling */
    .custom-input {
      background: #ffffff;
      border: 1px solid #cbd5e1;
      transition: all 0.3s;
      color: #0f172a;
    }
    .custom-input:focus {
      border-color: #7c3aed;
      box-shadow: 0 0 0 2px rgba(124, 58, 237, 0.15);
      outline: none;
    }

    /* Card buttons */
    .need-card, .size-card {
      background: #ffffff;
      border: 1px solid #e2e8f0;
      cursor: pointer;
      transition: all 0.3s;
      color: #475569;
    }
    .need-card:hover, .size-card:hover {
      border-color: rgba(124, 58, 237, 0.4);
      background: rgba(124, 58, 237, 0.03);
    }
    .need-card.selected, .size-card.selected {
      border-color: #7c3aed;
      background: rgba(124, 58, 237, 0.08);
      box-shadow: 0 0 15px rgba(124, 58, 237, 0.1);
      color: #7c3aed;
      font-weight: 700;
    }

    /* Pulsing AI radar */
    .radar-circle {
      position: relative;
      width: 140px;
      height: 140px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(124,58,237,0.06) 0%, rgba(37,99,235,0.01) 100%);
      border: 1px solid rgba(124, 58, 237, 0.2);
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .radar-wave {
      position: absolute;
      width: 100%;
      height: 100%;
      border-radius: 50%;
      border: 1px solid rgba(37, 99, 235, 0.3);
      animation: pulse-wave 2s infinite linear;
    }
    .radar-wave-delayed {
      position: absolute;
      width: 100%;
      height: 100%;
      border-radius: 50%;
      border: 1px solid rgba(124, 58, 237, 0.3);
      animation: pulse-wave 2s infinite linear;
      animation-delay: 1s;
    }
    @keyframes pulse-wave {
      0% { transform: scale(1); opacity: 1; }
      100% { transform: scale(1.6); opacity: 0; }
    }

    /* Blur profile photo simulation */
    .blurred-avatar {
      filter: blur(6px);
      transform: scale(1.1);
      transition: filter 0.3s;
    }

    /* Dynamic Content Theme Overrides for Light Theme */
    #matching-container h1,
    #matching-container h2,
    #matching-container h3,
    #matching-container h4,
    #matching-container .text-slate-100,
    #matching-container .text-slate-200 {
      color: #0f172a !important;
    }
    #matching-container p,
    #matching-container .text-slate-300 {
      color: #475569 !important;
    }
    #matching-container .text-slate-400,
    #matching-container .text-slate-500 {
      color: #64748b !important;
    }
    #matching-container .text-white:not(.btn, .btn *, .bg-gradient-to-r, .bg-gradient-to-r *, .tab-btn, .tab-btn *, .active, .active *, button, button *) {
      color: #0f172a !important;
    }
    
    #matching-container .bg-slate-950\/40,
    #matching-container .bg-slate-950\/60,
    #matching-container .bg-slate-900\/40,
    #matching-container .bg-slate-900\/30 {
      background-color: rgba(241, 245, 249, 0.8) !important;
      border-color: rgba(15, 23, 42, 0.08) !important;
    }
    
    #matching-container .border-white\/5,
    #matching-container .border-white\/10 {
      border-color: rgba(15, 23, 42, 0.08) !important;
    }
    
    #matching-container .bg-slate-800 {
      background-color: #f1f5f9 !important;
      color: #475569 !important;
    }
    
    #matching-container .bg-slate-800\/80 {
      background-color: rgba(241, 245, 249, 0.8) !important;
    }
    
    #matching-container .blurred-avatar.bg-slate-700\/60 {
      background-color: rgba(241, 245, 249, 0.8) !important;
    }
    
    #chat-message-input {
      background-color: #ffffff !important;
      border-color: #cbd5e1 !important;
      color: #0f172a !important;
    }
    #chat-message-input:focus {
      border-color: #7c3aed !important;
    }

    #matching-container button.bg-slate-800,
    #matching-container button.bg-slate-800:hover,
    #matching-container button.bg-slate-800:active {
      background-color: #f1f5f9 !important;
      color: #475569 !important;
      border-color: #cbd5e1 !important;
    }
    #matching-container button.bg-slate-800:hover {
      background-color: #cbd5e1 !important;
      color: #0f172a !important;
    }

    /* Notifications popup toast style */
    .toast-container {
      position: fixed;
      bottom: 24px;
      right: 24px;
      z-index: 1000;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .toast {
      background: rgba(255, 255, 255, 0.9);
      border: 1px solid rgba(15, 23, 42, 0.08);
      backdrop-filter: blur(10px);
      box-shadow: var(--shadow-md);
      animation: slide-in 0.3s forwards;
    }
    @keyframes slide-in {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
  </style>
</head>
<body>

  <!-- Decorative Blobs -->
  <div class="glow-bg">
    <div class="blob blob-purple"></div>
    <div class="blob blob-blue"></div>
    <div class="blob blob-pink"></div>
  </div>

  <!-- Header -->
  <header>
    <div class="nav-container">
      <a href="{% url 'main:index' %}" class="logo">
        DEPT
      </a>
      <ul class="nav-menu">
        <li class="nav-item active-nav"><a href="{% url 'aimatch:matching' %}">AI 매칭</a></li>
        <li class="nav-item"><a href="{% url 'main:index' %}">대시보드</a></li>
      </ul>
      <div class="nav-buttons flex items-center">
        <!-- Notification Menu -->
        <div class="notification-menu">
          <input type="hidden" name="csrfmiddlewaretoken" value="{{ csrf_token }}">
          <button class="notification-trigger" aria-label="알림 메뉴">
            <i class="ri-notification-3-line"></i>
            <span id="notification-badge" class="notification-badge hidden">0</span>
          </button>
          <div class="notification-dropdown">
            <div class="notification-header">
              <h3><i class="ri-notification-3-line"></i> 알림</h3>
              <button id="mark-all-read-btn" class="btn-mark-all">모두 읽음</button>
            </div>
            <div id="notification-list" class="notification-list">
              <div class="notification-empty">새로운 알림이 없습니다.</div>
            </div>
          </div>
        </div>

        <div class="profile-menu">
          <button class="profile-menu-trigger" aria-label="사용자 메뉴">
            <span class="header-avatar">{{ user.first_name|slice:":1" }}</span>
            <span class="header-username"><strong>{{ user.first_name }}</strong>님</span>
            <i class="ri-arrow-down-s-line arrow-icon"></i>
          </button>
          <div class="profile-menu-dropdown">
            <a href="{% url 'accounts:profile' %}"><i class="ri-user-settings-line"></i> 계정 설정</a>
            <a href="{% url 'accounts:password_change' %}"><i class="ri-lock-password-line"></i> 비밀번호 변경</a>
            <hr class="profile-menu-divider">
            <a href="{% url 'accounts:logout' %}" class="logout-item"><i class="ri-logout-box-r-line"></i> 로그아웃</a>
          </div>
        </div>
      </div>
    </div>
  </header>

  <!-- Main Container -->
  <main class="flex-grow max-w-6xl w-full mx-auto px-6 pt-32 pb-10 flex flex-col justify-start">
    
    <!-- Navigation Tabs (Only visible when not in a waiting room) -->
    <div id="matching-tabs" class="flex space-x-3 mb-8 justify-center">
      <button onclick="switchTab('match')" id="tab-match" class="tab-btn px-6 py-2.5 rounded-full border border-slate-200/80 text-slate-800 font-medium text-sm bg-slate-100/50 hover:bg-slate-100 hover:scale-[1.02] active:scale-[0.98] transition-all active">
        <i class="ri-magic-line mr-1.5"></i> AI 매칭 신청
      </button>
      <button onclick="switchTab('list')" id="tab-list" class="tab-btn px-6 py-2.5 rounded-full border border-slate-200/80 text-slate-600 font-medium text-sm bg-slate-100/50 hover:bg-slate-100 hover:scale-[1.02] active:scale-[0.98] transition-all">
        <i class="ri-list-check-3 mr-1.5"></i> 대기방 탐색
      </button>
    </div>

    <!-- Active Area Section -->
    <div id="matching-container" class="w-full flex-grow">
      <!-- Dynamic Screens are injected here via JS -->
    </div>
  </main>

  <!-- Footer -->
  <footer class="border-t border-slate-200 bg-slate-50/50 py-6 mt-12 text-slate-500 text-sm text-center">
    <div class="max-w-6xl mx-auto px-6 flex justify-between items-center">
      <div>&copy; 2026 DEPT. All rights reserved.</div>
      <div class="flex space-x-4 text-lg">
        <a href="#" class="text-slate-400 hover:text-slate-600 transition-colors"><i class="ri-github-fill"></i></a>
      </div>
    </div>
  </footer>

  <!-- Toast Popup Container -->
  <div id="toast-container" class="toast-container"></div>

  <!-- JavaScript and Logic -->
  <script>
    const csrfToken = '{{ csrf_token }}';
    const currentUserId = parseInt('{{ user.id }}') || null;
    let currentTab = 'match';
    let pollInterval = null;
    let state = {
      need: null,
      group: null,
      selectedType: 'study',
      selectedSize: 'small'
    };

    // Initialize application state
    document.addEventListener('DOMContentLoaded', () => {
      fetchUserStatus();
    });

    // Helper to switch main tabs
    function switchTab(tab) {
      if (state.group || (state.need && state.need.status === 'pending_matching')) {
        showToast('매칭이 진행 중이거나 대기방 참가 중일 때는 이동할 수 없습니다.', 'warning');
        return;
      }
      currentTab = tab;
      document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
      document.getElementById(`tab-${tab}`).classList.add('active');
      
      if (tab === 'match') {
        renderMatchingFlow();
      } else {
        renderGroupsList();
      }
    }

    // Fetch user status from backend
    async function fetchUserStatus() {
      try {
        const response = await fetch('/aimatch/api/user-status');
        const data = await response.json();
        
        state.need = data.need;
        state.group = data.group;
        
        // Decide what screen to show
        if (state.group) {
          document.getElementById('matching-tabs').classList.add('hidden');
          renderWaitingRoom();
          startPollingWaitingRoom();
        } else {
          document.getElementById('matching-tabs').classList.remove('hidden');
          stopPollingWaitingRoom();
          
          if (state.need) {
            if (state.need.status === 'pending_matching') {
              renderLoadingScreen();
              startPollingMatchResult(state.need.id);
            } else if (state.need.status === 'matched_waiting') {
              renderChoicesScreen();
            } else if (state.need.status === 'registered') {
              renderRegistrationComplete();
            } else {
              renderMatchingForm();
            }
          } else {
            if (currentTab === 'match') {
              renderMatchingForm();
            } else {
              renderGroupsList();
            }
          }
        }
      } catch (err) {
        showToast('상태 정보를 불러오는 도중 오류가 발생했습니다.', 'error');
      }
    }

    function renderMatchingFlow() {
      if (state.need) {
        if (state.need.status === 'pending_matching') {
          renderLoadingScreen();
        } else if (state.need.status === 'matched_waiting') {
          renderChoicesScreen();
        } else if (state.need.status === 'registered') {
          renderRegistrationComplete();
        } else {
          renderMatchingForm();
        }
      } else {
        renderMatchingForm();
      }
    }

    // ----------------------------------------------------
    // Screen Renders
    // ----------------------------------------------------

    // 1. Needs Input Form
    function renderMatchingForm() {
      const container = document.getElementById('matching-container');
      container.innerHTML = `
        <div class="max-w-2xl mx-auto glass-panel p-8 md:p-10 border border-white/5 relative">
          <div class="text-center mb-8">
            <h2 class="text-3xl font-bold font-outfit text-white mt-3">학우 맞춤 모임 매칭</h2>
            <p class="text-slate-400 text-sm mt-2">유형, 관심 주제 및 선호 규모를 기반으로 최적의 그룹 매칭을 시작합니다.</p>
          </div>
          
          <form id="need-form" onsubmit="handleFormSubmit(event)" class="space-y-6">
            <!-- 1. Category selection -->
            <div>
              <label class="block text-slate-300 font-semibold text-sm mb-3">1. 어떤 모임을 찾으시나요?</label>
              <div class="grid grid-cols-3 gap-3">
                <div id="type-friend" onclick="selectType('friend')" class="need-card rounded-xl p-4 text-center border selected">
                  <div class="text-2xl mb-1 text-purple-400"><i class="ri-user-heart-line"></i></div>
                  <span class="text-sm font-semibold">친구찾기</span>
                </div>
                <div id="type-study" onclick="selectType('study')" class="need-card rounded-xl p-4 text-center border">
                  <div class="text-2xl mb-1 text-blue-400"><i class="ri-book-open-line"></i></div>
                  <span class="text-sm font-semibold">스터디</span>
                </div>
                <div id="type-project" onclick="selectType('project')" class="need-card rounded-xl p-4 text-center border">
                  <div class="text-2xl mb-1 text-emerald-400"><i class="ri-code-box-line"></i></div>
                  <span class="text-sm font-semibold">프로젝트</span>
                </div>
              </div>
            </div>

            <!-- 2. Detail input -->
            <div>
              <label class="block text-slate-300 font-semibold text-sm mb-2">2. 희망하는 상세 내용을 작성해주세요.</label>
              <textarea id="detail-text" oninput="updateCharCounter(this)" class="custom-input w-full h-32 rounded-xl p-4 text-slate-200 text-sm resize-none" placeholder="예: 넉터에서 간단하게 같이 술 한잔할 사람 찾고 싶어요" minlength="10" maxlength="500" required></textarea>
              <div class="flex justify-between text-xs text-slate-500 mt-1">
                <span>최소 10자 ~ 최대 500자</span>
                <span id="char-counter">0 / 500 자</span>
              </div>
            </div>

            <!-- 3. Size selection -->
            <div>
              <label class="block text-slate-300 font-semibold text-sm mb-3">3. 선호하는 모임의 규모는 어느 정도인가요?</label>
              <div class="grid grid-cols-3 gap-3">
                <div id="size-small" onclick="selectSize('small')" class="size-card rounded-xl p-4 text-center border selected">
                  <span class="block text-lg font-bold font-outfit">적음</span>
                  <span class="text-xs text-slate-400">2 ~ 4명</span>
                </div>
                <div id="size-medium" onclick="selectSize('medium')" class="size-card rounded-xl p-4 text-center border">
                  <span class="block text-lg font-bold font-outfit">중간</span>
                  <span class="text-xs text-slate-400">5 ~ 7명</span>
                </div>
                <div id="size-large" onclick="selectSize('large')" class="size-card rounded-xl p-4 text-center border">
                  <span class="block text-lg font-bold font-outfit">많음</span>
                  <span class="text-xs text-slate-400">8명 이상</span>
                </div>
              </div>
            </div>

            <button type="submit" id="btn-submit" class="btn btn-primary w-full py-4 rounded-xl text-white font-semibold bg-gradient-to-r from-purple-500 to-blue-500 hover:from-purple-600 hover:to-blue-600 border-none shadow-lg shadow-purple-500/20 hover:scale-[1.02] active:scale-[0.98] transition-all flex items-center justify-center space-x-2">
              <span>매칭 분석 시작</span> <i class="ri-arrow-right-line"></i>
            </button>
          </form>
        </div>
      `;
      state.selectedType = 'friend';
      state.selectedSize = 'small';
    }

    function selectType(type) {
      state.selectedType = type;
      document.querySelectorAll('.need-card').forEach(c => c.classList.remove('selected'));
      document.getElementById(`type-${type}`).classList.add('selected');
    }

    function selectSize(size) {
      state.selectedSize = size;
      document.querySelectorAll('.size-card').forEach(c => c.classList.remove('selected'));
      document.getElementById(`size-${size}`).classList.add('selected');
    }

    function updateCharCounter(textarea) {
      const count = textarea.value.length;
      document.getElementById('char-counter').innerText = `${count} / 500 자`;
    }

    // 2. Loading / Analyzing Screen
    function renderLoadingScreen() {
      const container = document.getElementById('matching-container');
      container.innerHTML = `
        <div class="max-w-md mx-auto glass-panel p-8 text-center border border-white/5 py-16">
          <div class="flex justify-center mb-8">
            <div class="radar-circle">
              <div class="radar-wave"></div>
              <div class="radar-wave-delayed"></div>
              <div class="w-16 h-16 rounded-full bg-purple-500/20 border border-purple-500/50 flex items-center justify-center text-3xl text-purple-400 animate-pulse">
                <i class="ri-brain-line"></i>
              </div>
            </div>
          </div>
          <h3 class="text-2xl font-bold text-white font-outfit">최적의 그룹 분석 중</h3>
          <p class="text-slate-400 text-sm mt-3 px-4">선택하신 유형과 세부 내용을 인공지능이 분석하여 조건이 비슷한 대기방과 매칭 후보군을 계산하고 있습니다.</p>
          <div class="w-full bg-slate-800/80 rounded-full h-1.5 mt-8 overflow-hidden">
            <div class="bg-gradient-to-r from-purple-500 to-blue-500 h-1.5 rounded-full animate-[progress_1.5s_infinite_linear]" style="width: 40%"></div>
          </div>
          <style>
            @keyframes progress {
              0% { transform: translateX(-100%); }
              100% { transform: translateX(250%); }
            }
          </style>
          <p class="text-slate-500 text-xs mt-4">분석은 보통 5~10초 소요됩니다. 잠시만 기다려주세요.</p>
        </div>
      `;
    }

    // 3. Recommended Choices
    function renderChoicesScreen() {
      const container = document.getElementById('matching-container');
      const recommended = state.need.recommended_groups || [];
      
      let cardsHtml = '';
      recommended.forEach(group => {
        const tagBadges = group.tags.map(t => `<span class="bg-slate-800 border border-white/5 text-slate-300 text-xs px-2.5 py-1 rounded-full">${t}</span>`).join(' ');
        
        cardsHtml += `
          <div class="glass-panel p-6 flex flex-col justify-between border border-white/5 hover:border-purple-500/20 transition-all hover:translate-y-[-2px] duration-300">
            <div>
              <div class="flex items-center justify-between mb-4">
                <span class="text-xs font-semibold uppercase tracking-wider text-purple-400 bg-purple-500/10 px-2.5 py-1 rounded border border-purple-500/20 font-outfit">Match Recommendation</span>
                <span class="text-xs text-slate-400 font-medium bg-slate-800 px-2 py-1 rounded"><i class="ri-user-line mr-1 text-slate-500"></i>${group.current_members} / ${group.max_members} 명</span>
              </div>
              <h3 class="text-xl font-bold text-white mb-2">${group.title}</h3>
              <div class="flex flex-wrap gap-1.5 mb-4">${tagBadges}</div>
              <div class="bg-slate-950/40 border border-white/5 rounded-xl p-4 text-xs text-slate-400 leading-relaxed mb-6">

    // ----------------------------------------------------
    // Event Handlers (Actions)

    // Action 1: Submit Need Form
    async function handleFormSubmit(event) {
      event.preventDefault();
      
      const btnSubmit = document.getElementById('btn-submit');
      if (btnSubmit.disabled) return;
      btnSubmit.disabled = true;
      btnSubmit.innerHTML = `<i class="ri-loader-3-line animate-spin mr-1"></i> 제출 중...`;
      
      const detailText = document.getElementById('detail-text').value;
      
      try {
        const response = await fetch('/aimatch/needs', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'X-CSRFToken': csrfToken
          },
          body: JSON.stringify({
            type: state.selectedType,
            detail_text: detailText,
            size_category: state.selectedSize
          })
        });
        
        const data = await response.json();
        
        if (response.status === 202) {
          showToast('매칭이 성공적으로 접수되었습니다. 분석을 시작합니다.', 'success');
          fetchUserStatus();
        } else {
          showToast(data.error || '제출 도중 오류가 발생했습니다.', 'error');
          btnSubmit.disabled = false;
          btnSubmit.innerHTML = `<span>매칭 분석 시작</span> <i class="ri-arrow-right-line"></i>`;
        }
      } catch (err) {
        showToast('네트워크 오류가 발생했습니다.', 'error');
        btnSubmit.disabled = false;
        btnSubmit.innerHTML = `<span>매칭 분석 시작</span> <i class="ri-arrow-right-line"></i>`;
      }
    }

    // ----------------------------------------------------
    // Polling Mechanisms
    // ----------------------------------------------------

    function startPollingMatchResult(needId) {
      if (pollInterval) clearInterval(pollInterval);
      
      pollInterval = setInterval(async () => {
        try {
          const response = await fetch(`/aimatch/needs/${needId}/match-result`);
          const data = await response.json();
          
          if (data.status !== 'pending_matching') {
            clearInterval(pollInterval);
            pollInterval = null;
            fetchUserStatus();
          }
        } catch (err) {}
      }, 3000);
    }

    let waitingRoomSocket = null;
    function startPollingWaitingRoom() {
      if (waitingRoomSocket) {
        stopPollingWaitingRoom();
      }
      if (!state.group) return;

      const wsProtocol = window.location.protocol === 'https:' ? 'wss://' : 'ws://';
      const wsUrl = `${wsProtocol}${window.location.host}/ws/waiting-room/${state.group.id}/`;
      
      waitingRoomSocket = new WebSocket(wsUrl);

      waitingRoomSocket.onmessage = function(e) {
        try {
          const data = JSON.parse(e.data);
          if (data.type === 'waiting_room_update') {
            fetchStatusSilent();
            if (state.group) {
              fetchGroupMembers(state.group.id);
            }
          }
        } catch (err) {}
      };

      waitingRoomSocket.onclose = function(e) {
        console.log("Waiting room WebSocket closed.");
      };

      waitingRoomSocket.onerror = function(err) {
        console.error("Waiting room WebSocket error:", err);
      };
    }

    function stopPollingWaitingRoom() {
      if (waitingRoomSocket) {
        waitingRoomSocket.close();
        waitingRoomSocket = null;
      }
      stopChatWebSocket();
    }

    let chatSocket = null;
    function startChatWebSocket() {
      if (chatSocket) {
        stopChatWebSocket();
      }
      if (!state.group) return;

      const wsProtocol = window.location.protocol === 'https:' ? 'wss://' : 'ws://';
      const wsUrl = `${wsProtocol}${window.location.host}/ws/chat/${state.group.id}/`;
      
      chatSocket = new WebSocket(wsUrl);

      chatSocket.onmessage = function(e) {
        try {
          const data = JSON.parse(e.data);
          if (data.type === 'chat_message_received') {
            appendChatMessage(data.message);
          }
        } catch (err) {}
      };

      chatSocket.onclose = function(e) {
        console.log("Chat WebSocket closed.");
      };

      chatSocket.onerror = function(err) {
        console.error("Chat WebSocket error:", err);
      };
    }

    function stopChatWebSocket() {
      if (chatSocket) {
        chatSocket.close();
        chatSocket = null;
      }
    }

    async function loadChatHistory(groupId) {
      try {
        const response = await fetch(`/aimatch/groups/${groupId}/messages`);
        const data = await response.json();
        const messages = data.messages || [];
        
        const chatContainer = document.getElementById('chat-messages-list');
        if (!chatContainer) return;
        
        chatContainer.innerHTML = '';
        if (messages.length === 0) {
          chatContainer.innerHTML = '<div class="text-slate-500 text-center py-8">아직 대화가 없습니다. 첫 메시지를 보내보세요!</div>';
        } else {
          messages.forEach(msg => {
            appendChatMessage(msg, false);
          });
        }
        
        chatContainer.scrollTop = chatContainer.scrollHeight;
      } catch (err) {
        console.error("Failed to load chat history:", err);
      }
    }

    function escapeHtml(text) {
      if (!text) return '';
      const map = {
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        '"': '&quot;',
        "'": '&#039;'
      };
      return text.replace(/[&<>"']/g, function(m) { return map[m]; });
    }

    function appendChatMessage(msg, autoScroll = true) {
      const chatContainer = document.getElementById('chat-messages-list');
      if (!chatContainer) return;

      const placeholder = chatContainer.querySelector('.text-slate-500');
      if (placeholder && (placeholder.textContent.includes('불러오는 중') || placeholder.textContent.includes('아직 대화가 없습니다'))) {
        chatContainer.innerHTML = '';
      }

      const isSelf = msg.sender_id === currentUserId;
      const timeString = new Date(msg.created_at).toLocaleTimeString('ko-KR', { hour: 'numeric', minute: '2-digit', hour12: true });
      const escapedContent = escapeHtml(msg.content);

      const msgDiv = document.createElement('div');
      msgDiv.className = `flex ${isSelf ? 'justify-end' : 'justify-start'} items-start space-x-2.5`;

      if (isSelf) {
        msgDiv.innerHTML = `
          <div class="flex flex-col items-end max-w-[70%]">
            <div class="bg-purple-600 text-white px-4 py-2.5 rounded-2xl rounded-tr-none text-sm leading-relaxed break-all shadow-md">
              ${escapedContent}
            </div>
            <span class="text-[10px] text-slate-500 mt-1">${timeString}</span>
          </div>
        `;
      } else {
        const senderDeptText = msg.sender_dept || '';
        const senderYearText = msg.sender_year || '';
        const metaParts = [];
        if (senderDeptText) metaParts.push(senderDeptText);
        if (senderYearText) metaParts.push(senderYearText);
        const metaString = metaParts.length > 0 ? ` (${metaParts.join(', ')})` : '';
        const senderInfo = escapeHtml(`${msg.sender_name || '이름 없음'}${metaString}`);
        const avatarInitial = escapeHtml((msg.sender_name || '알').slice(0, 1));

        msgDiv.innerHTML = `
          <div class="w-8 h-8 rounded-full bg-slate-800 border border-white/5 flex items-center justify-center font-bold text-xs text-slate-300">
            ${avatarInitial}
          </div>
          <div class="flex flex-col max-w-[70%]">
            <span class="text-[11px] text-slate-400 mb-1 font-medium">${senderInfo}</span>
            <div class="bg-slate-800 text-slate-200 px-4 py-2.5 rounded-2xl rounded-tl-none text-sm leading-relaxed break-all border border-white/5 shadow-md">
              ${escapedContent}
            </div>
            <span class="text-[10px] text-slate-500 mt-1">${timeString}</span>
          </div>
        `;
      }

      chatContainer.appendChild(msgDiv);

      if (autoScroll) {
        chatContainer.scrollTop = chatContainer.scrollHeight;
      }
    }

    let isSendingMessage = false;
    function handleSendChatMessage(event) {
      event.preventDefault();
      if (isSendingMessage) return;

      const input = document.getElementById('chat-message-input');
      const btn = document.getElementById('chat-send-btn');
      if (!input || !chatSocket || chatSocket.readyState !== WebSocket.OPEN) return;

      const content = input.value.trim();
      if (!content) return;
      if (content.length > 150) {
        showToast('메시지는 최대 150자까지 입력 가능합니다.', 'warning');
        return;
      }

      isSendingMessage = true;
      if (btn) btn.disabled = true;

      try {
        chatSocket.send(JSON.stringify({
          'content': content
        }));
        input.value = '';
      } catch (err) {
        showToast('메시지 전송에 실패했습니다.', 'error');
      } finally {
        isSendingMessage = false;
        if (btn) btn.disabled = false;
        input.focus();
      }
    }

    function handleChatInput(element) {
      if (element.value.length > 150) {
        element.value = element.value.slice(0, 150);
        showToast('메시지는 최대 150자까지 입력 가능합니다.', 'warning');
      }
    }

    async function fetchStatusSilent() {
      try {
        const response = await fetch('/aimatch/api/user-status');
        const data = await response.json();
        
        if (!data.group || data.group.status !== state.group.status || data.group.current_members !== state.group.current_members) {
          const oldGroupId = state.group ? state.group.id : null;
          state.group = data.group;
          state.need = data.need;
          if (state.group) {
            renderWaitingRoom();
            if (oldGroupId !== state.group.id) {
              loadChatHistory(state.group.id);
              startChatWebSocket();
            }
          } else {
            fetchUserStatus();
          }
        }
      } catch (err) {}
    }

    function showToast(message, type = 'info') {
      const container = document.getElementById('toast-container');
      const toast = document.createElement('div');
      
      let icon = 'ri-information-line text-blue-400';
      if (type === 'success') icon = 'ri-checkbox-circle-line text-emerald-400';
      if (type === 'error') icon = 'ri-error-warning-line text-rose-400';
      if (type === 'warning') icon = 'ri-alert-line text-amber-400';

      toast.className = 'toast flex items-center space-x-3 px-4 py-3 rounded-xl text-sm text-slate-200 border border-white/10 shadow-lg';
      toast.innerHTML = `
        <i class="${icon} text-lg"></i>
        <span>${message}</span>
      `;
      
      container.appendChild(toast);
      
      setTimeout(() => {
        toast.style.animation = 'slide-in 0.3s reverse';
        setTimeout(() => {
          toast.remove();
        }, 300);
      }, 3500);
    }
  </script>
  <script src="{% static 'main/js/notifications.js' %}"></script>
</body>
</html>
