{% load static %}
<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>새 비밀번호 설정 - DEPT</title>
  <meta name="description" content="DEPT 계정의 새로운 비밀번호를 설정합니다.">
  
  <!-- RemixIcon for modern icons -->
  <link href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css" rel="stylesheet" />
  
  <!-- Custom Fonts & CSS -->
  <link rel="stylesheet" href="{% static 'main/css/style.css' %}?v=1.0.5">
  <link rel="stylesheet" href="{% static 'accounts/css/login.css' %}?v=1.0.5">
</head>
<body>

  <div class="auth-wrapper">
    <!-- Back to Home Link -->
    <a href="{% url 'main:index' %}" class="back-home">
      <i class="ri-arrow-left-line"></i> 홈으로 돌아가기
    </a>

    <!-- Interactive Background Blobs -->
    <div class="auth-bg-blob auth-blob-1"></div>
    <div class="auth-bg-blob auth-blob-2"></div>
    <div class="auth-bg-blob auth-blob-interactive" id="interactive-blob"></div>

    <div class="auth-container">
      <div class="auth-card">
        
        <!-- Auth Card Header -->
        <div class="auth-header">
          <a href="{% url 'main:index' %}" class="auth-logo">
            DEPT
          </a>
          <h2>새 비밀번호 설정</h2>
          <p>새로 사용할 안전한 비밀번호를 입력해주세요.</p>
        </div>

        <!-- Messages Alerts -->
        {% if messages %}
        <div class="auth-messages">
          {% for message in messages %}
          <div class="auth-alert alert-{{ message.tags }}">
            <i class="ri-error-warning-line alert-icon"></i>
            <span class="alert-text">{{ message }}</span>
          </div>
          {% endfor %}
        </div>
        {% endif %}

        <!-- Reset Password Form -->
        <form method="POST" action="" id="pwd-reset-form">
          {% csrf_token %}

          <!-- New Password Input -->
          <div class="form-group">
            <label for="new_password" class="form-label">새 비밀번호</label>
            <div class="input-wrapper">
              <input 
                type="password" 
                id="new_password" 
                name="new_password" 
                class="auth-input" 
                placeholder="8자 이상의 비밀번호" 
                autocomplete="new-password" 
                enterkeyhint="next" 
                required
              >
              <i class="ri-lock-line input-icon"></i>
              <button type="button" class="password-toggle" aria-label="비밀번호 보이기/숨기기">
                <i class="ri-eye-line"></i>
              </button>
            </div>
          </div>

          <!-- Confirm Password Input -->
          <div class="form-group">
            <label for="confirm_new_password" class="form-label">새 비밀번호 확인</label>
            <div class="input-wrapper">
              <input 
                type="password" 
                id="confirm_new_password" 
                name="confirm_new_password" 
                class="auth-input" 
                placeholder="비밀번호를 한번 더 입력해주세요" 
                autocomplete="new-password" 
                enterkeyhint="done" 
                required
              >
              <i class="ri-lock-check-line input-icon"></i>
              <button type="button" class="password-toggle" aria-label="비밀번호 보이기/숨기기">
                <i class="ri-eye-line"></i>
              </button>
            </div>
          </div>

          <!-- Submit Button -->
          <button type="submit" class="btn-auth-submit" id="btn-submit-pwd-reset">
            비밀번호 변경 <i class="ri-checkbox-circle-fill"></i>
          </button>

        </form>

      </div>
    </div>
  </div>

  <!-- Custom JavaScript -->
  <script src="{% static 'accounts/js/login.js' %}"></script>
</body>
</html>
