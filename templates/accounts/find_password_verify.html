{% load static %}
<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>인증 코드 입력 - DEPT</title>
  <meta name="description" content="이메일로 전송된 인증 코드를 입력하여 비밀번호 재설정을 계속합니다.">
  
  <!-- RemixIcon for modern icons -->
  <link href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css" rel="stylesheet" />
  
  <!-- Custom Fonts & CSS -->
  <link rel="stylesheet" href="{% static 'main/css/style.css' %}?v=1.0.5">
  <link rel="stylesheet" href="{% static 'accounts/css/login.css' %}?v=1.0.5">
</head>
<body>

  <div class="auth-wrapper">
    <!-- Back to Home Link -->
    <a href="{% url 'main:index' %}" class="back-home">
      <i class="ri-arrow-left-line"></i> 홈으로 돌아가기
    </a>

    <!-- Interactive Background Blobs -->
    <div class="auth-bg-blob auth-blob-1"></div>
    <div class="auth-bg-blob auth-blob-2"></div>
    <div class="auth-bg-blob auth-blob-interactive" id="interactive-blob"></div>

    <div class="auth-container">
      <div class="auth-card">
        
        <!-- Auth Card Header -->
        <div class="auth-header">
          <a href="{% url 'main:index' %}" class="auth-logo">
            DEPT
          </a>
          <h2>인증 코드 입력</h2>
          <p>등록하신 이메일 <b>{{ email }}</b> 주소로 6자리 인증 코드가 전송되었습니다.</p>
        </div>

        <!-- Messages Alerts -->
        {% if messages %}
        <div class="auth-messages">
          {% for message in messages %}
          <div class="auth-alert alert-{{ message.tags }}">
            <i class="ri-error-warning-line alert-icon"></i>
            <span class="alert-text">{{ message }}</span>
          </div>
          {% endfor %}
        </div>
        {% endif %}

        <!-- Verify Password Form -->
        <form method="POST" action="" id="pwd-verify-form">
          {% csrf_token %}

          <!-- Code Input -->
          <div class="form-group">
            <label for="code" class="form-label">인증 코드</label>
            <div class="input-wrapper">
              <input 
                type="text" 
                id="code" 
                name="code" 
                class="auth-input" 
                placeholder="6자리 숫자 입력" 
                maxlength="6"
                pattern="[0-9]{6}"
                inputmode="numeric"
                autocomplete="one-time-code" 
                enterkeyhint="done" 
                required
              >
              <i class="ri-key-2-line input-icon"></i>
            </div>
          </div>

          <!-- Submit Button -->
          <button type="submit" class="btn-auth-submit" id="btn-submit-pwd-verify">
            인증 코드 확인 <i class="ri-checkbox-circle-line"></i>
          </button>

        </form>

        <!-- Redirect to Find Password to Re-send -->
        <div class="auth-footer">
          코드를 받지 못하셨나요? <a href="{% url 'accounts:find_password' %}">다시 발송하기</a>
        </div>

      </div>
    </div>
  </div>

  <!-- Custom JavaScript -->
  <script src="{% static 'accounts/js/login.js' %}"></script>
</body>
</html>
