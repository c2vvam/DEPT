{% load static %}
<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>추가 정보 입력 - dept</title>
  <meta name="description" content="dept 서비스 이용을 위해 추가 정보를 입력해 주세요.">
  
  <!-- RemixIcon for modern icons -->
  <link href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css" rel="stylesheet" />
  
  <!-- Custom Fonts & CSS -->
  <link rel="stylesheet" href="{% static 'main/css/style.css' %}?v=1.0.5">
  <link rel="stylesheet" href="{% static 'accounts/css/login.css' %}?v=1.0.5">
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      corePlugins: {
        preflight: false,
      }
    }
  </script>
</head>
<body>

  <div class="auth-wrapper">
    <!-- Interactive Background Blobs -->
    <div class="auth-bg-blob auth-blob-1"></div>
    <div class="auth-bg-blob auth-blob-2"></div>
    <div class="auth-bg-blob auth-blob-interactive" id="interactive-blob"></div>

    <div class="auth-container">
      <div class="auth-card">
        
        <!-- Auth Card Header -->
        <div class="auth-header">
          <a href="{% url 'main:index' %}" class="auth-logo">
            DEPT
          </a>
          <h2>추가 정보 입력</h2>
          <p>안전한 대학 커뮤니티 이용을 위해 추가 정보를 기입해주세요.</p>
        </div>

        <!-- Messages Alerts -->
        {% if messages %}
        <div class="auth-messages">
          {% for message in messages %}
          <div class="auth-alert alert-{{ message.tags }}">
            <i class="ri-error-warning-line alert-icon"></i>
            <span class="alert-text">{{ message }}</span>
          </div>
          {% endfor %}
        </div>
        {% endif %}

        <!-- Progress Bar for Step 4 -->
        <div class="signup-progress mb-[32px]">
          <div class="progress-line-bg">
            <div class="progress-line-fill w-1/2"></div>
          </div>
          <div class="progress-step completed">
            <div class="step-dot">
              <i class="ri-mail-check-line"></i>
            </div>
            <span class="step-label">이메일 인증</span>
          </div>
          <div class="progress-step active">
            <div class="step-dot">
              <i class="ri-file-list-3-line"></i>
            </div>
            <span class="step-label">추가 정보</span>
          </div>
          <div class="progress-step">
            <div class="step-dot">
              <i class="ri-shield-user-line"></i>
            </div>
            <span class="step-label">학생증 인증</span>
          </div>
        </div>

        <!-- Extra Information Form -->
        <form method="POST" action="" id="signup-extra-form" novalidate>
          {% csrf_token %}

          <!-- Admission Year Input -->
          <div class="form-group">
            <label for="admission_year" class="form-label">입학년도</label>
            <div class="input-wrapper">
              <input 
                type="number" 
                id="admission_year" 
                name="admission_year" 
                class="auth-input" 
                placeholder="예: 2026" 
                min="1900" 
                max="2030"
                enterkeyhint="next" 
                required
              >
              <i class="ri-number-7 input-icon"></i>
            </div>
            <span class="validation-error-text" id="error-admission-year"></span>
          </div>

          <!-- Age Input -->
          <div class="form-group">
            <label for="age" class="form-label">나이</label>
            <div class="input-wrapper">
              <input 
                type="number" 
                id="age" 
                name="age" 
                class="auth-input" 
                placeholder="본인의 나이를 숫자로 입력" 
                min="1" 
                max="120"
                enterkeyhint="next"
                required
              >
              <i class="ri-calendar-line input-icon"></i>
            </div>
            <span class="validation-error-text" id="error-age"></span>
          </div>

          <!-- Department Input (Fixed to 자유전공학부) -->
          <div class="form-group">
            <label for="department" class="form-label">학과</label>
            <div class="input-wrapper">
              <select id="department" name="department" class="auth-input appearance-none" required>
                <option value="자유전공학부" selected>자유전공학부</option>
              </select>
              <i class="ri-book-open-line input-icon"></i>
              <i class="ri-arrow-down-s-line absolute right-[16px] top-1/2 -translate-y-1/2 pointer-events-none text-[#a0aec0]"></i>
            </div>
            <span class="validation-error-text" id="error-department"></span>
            <p class="text-[0.85rem] text-[#718096] mt-[8px] leading-[1.4]">
              현재 가입 가능한 학과는 <strong>자유전공학부</strong>로 제한되어 있습니다.
            </p>
          </div>

          <!-- Submit Button -->
          <button type="submit" class="btn-auth-submit mt-[32px] w-full h-[50px] flex items-center justify-center gap-[8px] font-semibold" id="submit-btn">
            다음 단계로 <i class="ri-arrow-right-line"></i>
          </button>

        </form>

      </div>
    </div>
  </div>

  <!-- Script for Extra Page Client Validation -->
  <script src="{% static 'accounts/js/login.js' %}"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const form = document.getElementById('signup-extra-form');
      const inputYear = document.getElementById('admission_year');
      const inputAge = document.getElementById('age');
      
      const errYear = document.getElementById('error-admission-year');
      const errAge = document.getElementById('error-age');
      
      const submitBtn = document.getElementById('submit-btn');

      // Live error clear
      inputYear.addEventListener('input', () => { errYear.textContent = ''; });
      if (inputAge) {
        inputAge.addEventListener('input', () => { errAge.textContent = ''; });
      }

      form.addEventListener('submit', (e) => {
        let isValid = true;
        const currentYear = new Date().getFullYear();

        // Validate Admission Year
        if (!inputYear.value) {
          errYear.textContent = '입학년도를 입력해 주세요.';
          isValid = false;
        } else {
          const year = parseInt(inputYear.value, 10);
          if (isNaN(year) || year < 1900 || year > currentYear) {
            errYear.textContent = `올바른 연도(1900 ~ ${currentYear})를 입력해 주세요.`;
            isValid = false;
          }
        }

        // Validate Age
        if (!inputAge.value) {
          errAge.textContent = '나이를 입력해 주세요.';
          isValid = false;
        } else {
          const age = parseInt(inputAge.value, 10);
          if (isNaN(age) || age < 1 || age > 120) {
            errAge.textContent = '올바른 나이를 입력해 주세요. (1 ~ 120)';
            isValid = false;
          }
        }

        if (!isValid) {
          e.preventDefault();
        } else {
          // Double submission prevention
          if (submitBtn.dataset.submitted === 'true') {
            e.preventDefault();
            return;
          }
          submitBtn.dataset.submitted = 'true';
          submitBtn.disabled = true;
          submitBtn.innerHTML = '처리 중... <i class="ri-loader-4-line animate-spin"></i>';
        }
      });
    });
  </script>
</body>
</html>
