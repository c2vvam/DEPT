{% load static %}
<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>로그인 - DEPT</title>
  <meta name="description" content="DEPT에 로그인하고 팀 프로젝트를 더 공정하고 똑똑하게 관리해보세요.">
  
  <!-- RemixIcon for modern icons -->
  <link href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css" rel="stylesheet" />
  
  <!-- Custom Fonts & CSS -->
  <link rel="stylesheet" href="{% static 'main/css/style.css' %}?v=1.0.5">
  <link rel="stylesheet" href="{% static 'accounts/css/login.css' %}?v=1.0.5">
</head>
<body>

  <div class="auth-wrapper">
    <!-- Back to Home Link -->
    <a href="{% url 'main:index' %}" class="back-home">
      <i class="ri-arrow-left-line"></i> 홈으로 돌아가기
    </a>

    <!-- Interactive Background Blobs -->
    <div class="auth-bg-blob auth-blob-1"></div>
    <div class="auth-bg-blob auth-blob-2"></div>
    <div class="auth-bg-blob auth-blob-interactive" id="interactive-blob"></div>

    <div class="auth-container">
      <div class="auth-card">
        
        <!-- Auth Card Header -->
        <div class="auth-header">
          <a href="{% url 'main:index' %}" class="auth-logo">
            DEPT
          </a>
          <h2>반가워요!</h2>
          <p>DEPT 계정으로 로그인해주세요.</p>
        </div>

        <!-- Messages Alerts -->
        {% if messages %}
        <div class="auth-messages">
          {% for message in messages %}
          <div class="auth-alert alert-{{ message.tags }}">
            <i class="ri-error-warning-line alert-icon"></i>
            <span class="alert-text">{{ message }}</span>
          </div>
          {% endfor %}
        </div>
        {% endif %}

        <!-- Login Form -->
        <form method="POST" action="" id="login-form">
          {% csrf_token %}

          <!-- Email Input -->
          <div class="form-group">
            <label for="email" class="form-label">이메일 주소</label>
            <div class="input-wrapper">
              <input 
                type="email" 
                id="email" 
                name="email" 
                class="auth-input" 
                placeholder="name@pusan.ac.kr" 
                autocomplete="username" 
                enterkeyhint="next" 
                required
              >
              <i class="ri-mail-line input-icon"></i>
            </div>
          </div>

          <!-- Password Input -->
          <div class="form-group">
            <label for="current-password" class="form-label">비밀번호</label>
            <div class="input-wrapper">
              <input 
                type="password" 
                id="current-password" 
                name="password" 
                class="auth-input" 
                placeholder="비밀번호를 입력해주세요" 
                autocomplete="current-password" 
                enterkeyhint="done" 
                required
              >
              <i class="ri-lock-line input-icon"></i>
              <button type="button" class="password-toggle" aria-label="비밀번호 보이기/숨기기">
                <i class="ri-eye-line"></i>
              </button>
            </div>
          </div>

          <!-- Form Actions -->
          <div class="form-actions">
            <label class="checkbox-container">
              <input type="checkbox" name="remember_me">
              <span class="custom-checkbox">
                <i class="ri-check-line"></i>
              </span>
              로그인 상태 유지
            </label>
            <a href="{% url 'accounts:find_password' %}" class="forgot-link">비밀번호를 잊으셨나요?</a>
          </div>

          <!-- Submit Button -->
          <button type="submit" class="btn-auth-submit" id="btn-submit-login">
            로그인 <i class="ri-arrow-right-line"></i>
          </button>

        </form>

        <!-- Redirect to Register -->
        <div class="auth-footer">
          아직 회원이 아니신가요? <a href="{% url 'accounts:signup' %}">지금 가입하기</a>
        </div>

      </div>
    </div>
  </div>

  <!-- Custom JavaScript -->
  <script src="{% static 'accounts/js/login.js' %}"></script>
</body>
</html>
