{% load static %}
<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>비밀번호 재설정 - DEPT</title>
  <meta name="description" content="DEPT 계정의 비밀번호를 안전하게 재설정합니다.">
  
  <!-- RemixIcon for modern icons -->
  <link href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css" rel="stylesheet" />
  
  <!-- Custom Fonts & CSS -->
  <link rel="stylesheet" href="{% static 'main/css/style.css' %}?v=1.0.5">
  <link rel="stylesheet" href="{% static 'accounts/css/login.css' %}?v=1.0.5">
</head>
<body>

  <div class="auth-wrapper">
    <!-- Back to Home Link -->
    <a href="{% url 'main:index' %}" class="back-home">
      <i class="ri-arrow-left-line"></i> 홈으로 돌아가기
    </a>

    <!-- Interactive Background Blobs -->
    <div class="auth-bg-blob auth-blob-1"></div>
    <div class="auth-bg-blob auth-blob-2"></div>
    <div class="auth-bg-blob auth-blob-interactive" id="interactive-blob"></div>

    <div class="auth-container">
      <div class="auth-card">
        
        <!-- Auth Card Header -->
        <div class="auth-header">
          <a href="{% url 'main:index' %}" class="auth-logo">
            DEPT
          </a>
          <h2>비밀번호 재설정</h2>
          <p>등록하신 부산대학교 이메일 주소를 입력해주세요.</p>
        </div>

        <!-- Messages Alerts -->
        {% if messages %}
        <div class="auth-messages">
          {% for message in messages %}
          <div class="auth-alert alert-{{ message.tags }}">
            <i class="ri-error-warning-line alert-icon"></i>
            <span class="alert-text">{{ message }}</span>
          </div>
          {% endfor %}
        </div>
        {% endif %}

        <!-- Find Password Form -->
        <form method="POST" action="" id="pwd-find-form">
          {% csrf_token %}

          <!-- Email Input -->
          <div class="form-group">
            <label for="email" class="form-label">이메일 주소</label>
            <div class="input-wrapper">
              <input 
                type="email" 
                id="email" 
                name="email" 
                class="auth-input" 
                placeholder="name@pusan.ac.kr" 
                autocomplete="email" 
                enterkeyhint="done" 
                required
              >
              <i class="ri-mail-line input-icon"></i>
            </div>
          </div>

          <!-- Submit Button -->
          <button type="submit" class="btn-auth-submit" id="btn-submit-pwd-find">
            인증 코드 요청 <i class="ri-mail-send-line"></i>
          </button>

        </form>

        <!-- Redirect to Login -->
        <div class="auth-footer">
          기억나셨나요? <a href="{% url 'accounts:login' %}">로그인하러 가기</a>
        </div>

      </div>
    </div>
  </div>

  <!-- Custom JavaScript -->
  <script src="{% static 'accounts/js/login.js' %}"></script>
</body>
</html>
